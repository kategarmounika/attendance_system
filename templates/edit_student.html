{% extends 'base.html' %}
{% block content %}

<h3>Edit Student</h3>

<form method="POST">
    <div class="mb-3">
        <label>Name</label>
        <input type="text" name="name" class="form-control" value="{{ student.name }}" required>
    </div>

    <div class="mb-3">
        <label>Roll No</label>
        <input type="text" name="roll" class="form-control" value="{{ student.roll_no }}" required>
    </div>

    <button class="btn btn-primary">Update</button>
    <a href="/" class="btn btn-secondary">Cancel</a>
</form>

{% endblock %}
